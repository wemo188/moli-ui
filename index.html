
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Starlet</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&family=Noto+Sans+SC:wght@100;300;400;500;700;900&family=LXGW+WenKai:wght@300;400;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<script>
(function(){
  var v = Date.now();
  var css = [
    'base.css','panels.css','character.css','worldbook.css',
    'chat.css','preset.css','calendar.css','dock.css',
    'cards.css','workshop.css','user.css','memory.css',
    'wechat.css','char-mgr.css','api.css','offline.css'
  ];
  css.forEach(function(href){
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = href + '?v=' + v;
    document.head.appendChild(link);
  });
})();
</script>
</head>
<body>

<!-- ====== 背景层 ====== -->
<div id="bgLayer" class="bg-layer"></div>

<!-- ====== 主页面 ====== -->
<main id="mainContent" class="main-content page-slider-main">
  <div id="pageSlider" class="page-slider">

    <!-- 第一页 -->
    <section class="screen-page screen-page-1">
      <div class="screen-page-inner" style="display:flex;flex-direction:column;min-height:100%;padding:12px 12px 0;">

        <!-- 1. 两张角色卡并排 -->
        <div class="card-row" id="cardRow" style="display:flex;justify-content:center;align-items:flex-start;gap:30px;padding:10px 0 0;width:100%;margin-top:5px;">
          <div class="bx-w" id="profileCard-L" data-side="left" style="width:190px;flex-shrink:0;">
            <div class="bx-tag-wrap">
              <div class="bx-tag bx-tag1 bx-tag-placeholder">标签</div>
              <div class="bx-tag bx-tag2 bx-tag-placeholder">标签</div>
            </div>
            <div class="bx-cw"><div class="bx-cd">
              <div class="bx-av-box"><div class="bx-av-front"><div class="bx-av-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>点击设置</span></div></div></div>
              <div class="bx-name-bar">
                <div class="bx-name bx-name-placeholder">角色名</div>
                <div class="bx-sub">✥同你奔赴…✥</div>
              </div>
            </div></div>
          </div>
          <div class="bx-w" id="profileCard-R" data-side="right" style="width:190px;flex-shrink:0;">
            <div class="bx-cw"><div class="bx-cd">
              <div class="bx-side-ribbon">
                <div class="bx-ribbon-tab r1 bx-ribbon-placeholder">标签</div>
                <div class="bx-ribbon-tab r2 bx-ribbon-placeholder">标签</div>
              </div>
              <div class="bx-av-box"><div class="bx-av-front"><div class="bx-av-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>点击设置</span></div></div></div>
              <div class="bx-name-bar">
                <div class="bx-name bx-name-placeholder">角色名</div>
                <div class="bx-sub">◈与你共赏…◈</div>
              </div>
            </div></div>
          </div>
        </div>

        <!-- 2. 月历+时间 -->
        <div class="cal-time-row" id="calTimeRow" style="display:flex;gap:10px;width:100%;min-height:170px;margin-top:14px;">
          <div class="time-side" style="width:40%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;">
            <div class="cal-year" id="calYear" style="font-size:11px;color:#333;letter-spacing:2px;font-weight:600;">2025</div>
            <div class="cal-month" id="calMonth" style="font-size:38px;font-weight:900;color:#111;line-height:1.1;margin:4px 0;">六月</div>
            <div class="cal-month-en" id="calMonthEn" style="font-size:11px;color:#555;letter-spacing:1px;font-weight:500;">JUNE</div>
            <div class="cal-clock" id="calClock" style="font-size:20px;font-weight:700;color:#111;margin-top:8px;font-variant-numeric:tabular-nums;">--:--<span class="cal-sec" style="font-size:13px;color:#666;margin-left:2px;">:--</span></div>
          </div>
          <div class="cal-side" style="width:60%;display:flex;flex-direction:column;padding:6px 4px;overflow:hidden;">
            <div class="cal-nav" id="calNav" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;padding:0 2px;"><span style="font-size:10px;color:#555;font-weight:600;">2025年6月</span><span style="font-size:10px;color:#555;">☾</span></div>
            <div class="cal-weekdays" style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:2px;">
              <span style="text-align:center;font-size:9px;color:#888;font-weight:600;">日</span>
              <span style="text-align:center;font-size:9px;color:#888;font-weight:600;">一</span>
              <span style="text-align:center;font-size:9px;color:#888;font-weight:600;">二</span>
              <span style="text-align:center;font-size:9px;color:#888;font-weight:600;">三</span>
              <span style="text-align:center;font-size:9px;color:#888;font-weight:600;">四</span>
              <span style="text-align:center;font-size:9px;color:#888;font-weight:600;">五</span>
              <span style="text-align:center;font-size:9px;color:#888;font-weight:600;">六</span>
            </div>
            <div class="cal-days" id="calDays" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1;"></div>
          </div>
        </div>

        <!-- 3. 四个图标 -->
        <div class="card-icons-wrap" id="cardIconsRow" style="display:flex;gap:20px;justify-content:space-around;margin-top:14px;width:100%;">
          <div class="card-icon-item" id="cardIcon1" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">
            <div class="card-icon-img" style="width:80px;height:80px;border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 32px rgba(0,0,0,.12),inset 0 1px 1px rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);">
              <svg viewBox="0 0 64 64" fill="none" width="56" height="56">
                <mask id="hm1"><rect width="64" height="64" fill="white"/><path d="M32 44L22.4 34.8C19.6 32 19.6 27.6 22.4 24.8C25 22.2 29.2 22.2 31.2 25.2L32 26.4L32.8 25.2C34.8 22.2 39 22.2 41.6 24.8C44.4 27.6 44.4 32 41.6 34.8L32 44Z" fill="black"/></mask>
                <circle cx="32" cy="32" r="22" stroke="#999" stroke-width="2.2" fill="#999" mask="url(#hm1)"/>
                <path d="M32 44L22.4 34.8C19.6 32 19.6 27.6 22.4 24.8C25 22.2 29.2 22.2 31.2 25.2L32 26.4L32.8 25.2C34.8 22.2 39 22.2 41.6 24.8C44.4 27.6 44.4 32 41.6 34.8L32 44Z" stroke="#999" stroke-width="1.8" fill="none"/>
              </svg>
            </div>
            <div class="card-icon-label" style="font-size:12.5px;color:#fff;text-align:center;letter-spacing:1px;font-weight:800;">User</div>
          </div>
          <div class="card-icon-item" id="cardIcon2" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">
            <div class="card-icon-img" style="width:80px;height:80px;border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 32px rgba(0,0,0,.12),inset 0 1px 1px rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);">
              <svg viewBox="0 0 64 64" fill="none" width="52" height="52">
                <rect x="8" y="10" width="46" height="44" rx="4" stroke="#999" stroke-width="2" fill="none"/>
                <path d="M21 18L23 23L28 23.5L24 27L25 32L21 29L17 32L18 27L14 23.5L19 23Z" stroke="#999" stroke-width="1.6" stroke-linejoin="round" fill="#999"/>
                <line x1="34" y1="20" x2="50" y2="20" stroke="#999" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="34" y1="28" x2="46" y2="28" stroke="#999" stroke-width="1.6" stroke-linecap="round"/>
                <line x1="34" y1="36" x2="48" y2="36" stroke="#999" stroke-width="1.6" stroke-linecap="round"/>
                <line x1="14" y1="44" x2="50" y2="44" stroke="#999" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="3 2"/>
              </svg>
            </div>
            <div class="card-icon-label" style="font-size:12.5px;color:#fff;text-align:center;letter-spacing:1px;font-weight:800;">Char</div>
          </div>
          <div class="card-icon-item" id="cardIcon3" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">
            <div class="card-icon-img" style="width:80px;height:80px;border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 32px rgba(0,0,0,.12),inset 0 1px 1px rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);">
              <svg viewBox="0 0 64 64" fill="none" width="56" height="56">
                <mask id="pm1"><rect width="64" height="64" fill="white"/><circle cx="20" cy="26" r="4.5" fill="black"/><circle cx="32" cy="18" r="4.5" fill="black"/><circle cx="44" cy="26" r="4.5" fill="black"/><circle cx="22" cy="38" r="4.5" fill="black"/></mask>
                <path d="M32 8C18.7 8 8 18.7 8 32C8 45.3 18.7 56 32 56C34.2 56 36 54.2 36 52C36 51 35.6 50.1 35 49.4C34.4 48.7 34 47.8 34 46.8C34 44.6 35.8 42.8 38 42.8H42C50.3 42.8 57 36.1 57 27.8C57 16.9 45.7 8 32 8Z" stroke="#999" stroke-width="2.2" fill="#999" mask="url(#pm1)"/>
                <circle cx="20" cy="26" r="4.5" stroke="#999" stroke-width="1.8" fill="none"/>
                <circle cx="32" cy="18" r="4.5" stroke="#999" stroke-width="1.8" fill="none"/>
                <circle cx="44" cy="26" r="4.5" stroke="#999" stroke-width="1.8" fill="none"/>
                <circle cx="22" cy="38" r="4.5" stroke="#999" stroke-width="1.8" fill="none"/>
              </svg>
            </div>
            <div class="card-icon-label" style="font-size:12.5px;color:#fff;text-align:center;letter-spacing:1px;font-weight:800;">美化</div>
          </div>
          <div class="card-icon-item" id="cardIcon4" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">
            <div class="card-icon-img" style="width:80px;height:80px;border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 32px rgba(0,0,0,.12),inset 0 1px 1px rgba(255,255,255,.15);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);">
              <svg viewBox="0 0 64 64" fill="none" width="56" height="56">
                <mask id="gm1"><rect width="64" height="64" fill="white"/><circle cx="32" cy="26.5" r="7" fill="black"/></mask>
                <path d="M30 8H34L35 13C36.5 13.4 37.9 14 39.2 14.8L43.5 12L46.5 15L44.2 19.2C45 20.5 45.6 21.9 46 23.4L51 24.5V28.5L46 29.6C45.6 31.1 45 32.5 44.2 33.8L46.5 38L43.5 41L39.2 38.2C37.9 39 36.5 39.6 35 40L34 45H30L29 40C27.5 39.6 26.1 39 24.8 38.2L20.5 41L17.5 38L19.8 33.8C19 32.5 18.4 31.1 18 29.6L13 28.5V24.5L18 23.4C18.4 21.9 19 20.5 19.8 19.2L17.5 15L20.5 12L24.8 14.8C26.1 14 27.5 13.4 29 13L30 8Z" stroke="#999" stroke-width="2" stroke-linejoin="round" fill="#999" mask="url(#gm1)"/>
                <circle cx="32" cy="26.5" r="7" stroke="#999" stroke-width="1.8" fill="none"/>
              </svg>
            </div>
            <div class="card-icon-label" style="font-size:12.5px;color:#fff;text-align:center;letter-spacing:1px;font-weight:800;">设置</div>
          </div>
        </div>

        <!-- 4. 圆头像+气泡 -->
        <div class="hl-avatars-row" id="hlAvatarsRow" style="display:flex;align-items:flex-start;justify-content:center;gap:280px;margin-top:25px;width:max-content;margin-right:210px;">
          <div class="hl-avatar-unit" id="hlAvatarWrapRight" style="position:relative;display:flex;flex-direction:column;align-items:center;">
            <div class="hl-bubble hl-bubble-right">
              <div class="hl-bubble-arrow-outer"></div>
              <div class="hl-bubble-arrow-inner"></div>
              <span class="hl-bubble-display" id="hlInputRight"></span>
            </div>
            <div class="hl-avatar" id="hlAvatarRight" data-side="hlRight" style="width:65px;height:65px;border-radius:50%;border:1px solid #2a2a2a;background:white;display:flex;align-items:center;justify-content:center;padding:3px;cursor:pointer;">
              <div class="hl-avatar-inner" style="width:100%;height:100%;border-radius:50%;overflow:hidden;background:#f5f5f5;display:flex;align-items:center;justify-content:center;position:relative;">
                <svg class="hl-avatar-placeholder" viewBox="0 0 40 40" fill="none" style="width:24px;height:24px;position:absolute;z-index:1;">
                  <circle cx="20" cy="15" r="6" stroke="#2a2a2a" stroke-width="2" fill="none"/>
                  <path d="M8 34C8 28 13 24 20 24C27 24 32 28 32 34" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" fill="none"/>
                </svg>
                <div class="hl-avatar-bg" id="hlImgRight"></div>
              </div>
            </div>
            <div class="hl-chatbar hl-chatbar-bot" style="position:absolute;top:100%;left:100%;margin-top:-20px;border-radius:4px 18px 18px 18px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,0.06);padding:9px;white-space:nowrap;z-index:5;direction:ltr;">
              <span class="hl-chatbar-display" id="hlChatRight" data-placeholder="说点什么..." style="font-size:13px;color:#2a2a2a;font-weight:600;letter-spacing:0.5px;min-width:50px;text-align:center;display:inline-block;"></span>
            </div>
          </div>
          <div class="hl-avatar-unit" id="hlAvatarWrapLeft" style="position:relative;display:flex;flex-direction:column;align-items:center;">
            <div class="hl-bubble hl-bubble-left">
              <div class="hl-bubble-arrow-outer"></div>
              <div class="hl-bubble-arrow-inner"></div>
              <span class="hl-bubble-display" id="hlInputLeft"></span>
            </div>
            <div class="hl-avatar" id="hlAvatarLeft" data-side="hlLeft" style="width:65px;height:65px;border-radius:50%;border:1px solid #2a2a2a;background:white;display:flex;align-items:center;justify-content:center;padding:3px;cursor:pointer;">
              <div class="hl-avatar-inner" style="width:100%;height:100%;border-radius:50%;overflow:hidden;background:#f5f5f5;display:flex;align-items:center;justify-content:center;position:relative;">
                <svg class="hl-avatar-placeholder" viewBox="0 0 40 40" fill="none" style="width:24px;height:24px;position:absolute;z-index:1;">
                  <circle cx="20" cy="15" r="6" stroke="#2a2a2a" stroke-width="2" fill="none"/>
                  <path d="M8 34C8 28 13 24 20 24C27 24 32 28 32 34" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" fill="none"/>
                </svg>
                <div class="hl-avatar-bg" id="hlImgLeft"></div>
              </div>
            </div>
            <div class="hl-chatbar hl-chatbar-bl" style="position:absolute;top:100%;right:100%;margin-top:-83px;margin-left:10px;border-radius:18px 18px 4px 18px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,0.06);padding:9px;white-space:nowrap;z-index:5;direction:rtl;">
              <span class="hl-chatbar-display" id="hlChatLeft" data-placeholder="说点什么..." style="font-size:13px;color:#2a2a2a;font-weight:600;letter-spacing:0.5px;min-width:50px;text-align:center;display:inline-block;direction:ltr;"></span>
            </div>
          </div>
        </div>

        <!-- 5. Eden文字卡片 -->
        <div class="eden-card" id="edenCard" style="margin-top:20px;">
          <div class="eden-text" id="edenText" style="font-size:38px;">文字填写区域，可以多行</div>
        </div>

      </div>
    </section>

    <!-- 第二页 -->
    <section class="screen-page screen-page-2">
      <div class="screen-page-inner" style="position:relative;height:100%;padding:12px;display:flex;align-items:center;justify-content:center;">
        <div class="pixel-dialog" id="hlTextCard" style="max-width:320px;width:100%;">
          <div class="pixel-header">
            <div class="pixel-hearts">
              <div class="pixel-heart"><div class="ph-core"></div></div>
              <div class="pixel-heart"><div class="ph-core"></div></div>
              <div class="pixel-heart"><div class="ph-core"></div></div>
            </div>
            <div class="pixel-btns">
              <div class="pixel-btn minimize"></div>
              <div class="pixel-btn maximize"></div>
              <div class="pixel-btn close"></div>
            </div>
          </div>
          <div class="pixel-body">
            <div class="pixel-text-area">
              <span class="pixel-text-display" id="hlTextTop" data-placeholder="第一行..."></span>
              <div class="pixel-text-divider"></div>
              <span class="pixel-text-display" id="hlTextMid" data-placeholder="第二行..."></span>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>
  <div class="screen-indicators">
    <button class="screen-dot active" type="button" data-screen="0"></button>
    <button class="screen-dot" type="button" data-screen="1"></button>
  </div>
</main>

<!-- ====== 底部栏 ====== -->
<div class="dock" id="dockBar">
  <div class="dock-item" id="dockChat">
    <div class="mk-card">
      <svg viewBox="0 0 64 64" fill="none" width="34" height="34">
        <mask id="cm1"><rect width="64" height="64" fill="white"/><line x1="23" y1="27.5" x2="41" y2="27.5" stroke="black" stroke-width="4" stroke-linecap="round"/><line x1="23" y1="34.5" x2="35" y2="34.5" stroke="black" stroke-width="4" stroke-linecap="round"/></mask>

  </div>
  <div class="dock-item" id="dockStory">
    <div class="mk-card">
      <svg viewBox="0 0 64 64" fill="none" width="32" height="32">

        <rect x="14" y="6" width="38" height="46" rx="4" fill="#999" mask="url(#sm1)"/>

    </div>
  </div>
  <div class="dock-item" id="dockCheckin">
    <div class="mk-card">
      <svg viewBox="0 0 64 64" fill="none" width="32" height="32">
        <mask id="ck1"><rect width="64" height="64" fill="white"/><rect x="21" y="18" width="22" height="28" rx="1.5" fill="black"/><circle cx="32" cy="50" r="2.5" fill="black"/></mask>
        <rect x="18" y="10" width="28" height="44" rx="4" fill="#999" mask="url(#ck1)"/>
        <line x1="28" y1="13" x2="36" y2="13" stroke="#999" stroke-width="1.6" stroke-linecap="round"/>
        <rect x="21" y="18" width="22" height="28" rx="1.5" fill="none" stroke="#999" stroke-width="1.4"/>
        <circle cx="32" cy="50" r="2.5" stroke="#999" stroke-width="1.5" fill="none"/>
        <line x1="24" y1="23" x2="40" y2="23" stroke="#999" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="24" y1="28" x2="35" y2="28" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24" y1="33" x2="39" y2="33" stroke="#999" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="24" y1="38" x2="33" y2="38" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
  <div class="dock-item" id="dockForum">

<!-- ====== JS ====== -->
<script>
(function(){
  var v = Date.now();
  var files = [
    'script.js','theme.js','font.js','api.js','bg.js',
    'character.js','user.js','worldbook.js','preset.js',
    'chat.js','chatui.js','calendar.js','cards.js','frost.js','char-mgr.js',
    'workshop.js','wechat.js','dock.js','memory.js','offlineui.js','offline.js'
  ];
  var idx = 0;
  function loadNext(){
    if(idx >= files.length){
      if(document.readyState === 'complete' || document.readyState === 'interactive'){
        App.LS.onReady(function(){ App.init(); });
      } else {
        window.addEventListener('DOMContentLoaded', function(){
          App.LS.onReady(function(){ App.init(); });
        });
      }
      return;
    }
    var s = document.createElement('script');
    s.src = files[idx] + '?v=' + v;
    s.onload = function(){ idx++; loadNext(); };
    s.onerror = function(){ console.warn('加载失败: ' + files[idx]); idx++; loadNext(); };
    document.body.appendChild(s);
  }
  loadNext();
})();
</script>
