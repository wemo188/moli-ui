<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小手机 · BYOK Chat</title>
  <style>
    :root{
      --accent:#adcdea;
      --bg:#ffffff;
      --ink:#0f172a;
      --muted:#475569;
      --line:rgba(15,23,42,.12);
      --shadow: 0 18px 48px rgba(15,23,42,.14);
      --radius: 16px;
      --radius2: 12px;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, "Noto Sans CJK SC", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--ink);
      background:
        radial-gradient(1200px 900px at 15% 10%, rgba(173,205,234,.75), transparent 60%),
        linear-gradient(180deg, var(--bg), rgba(173,205,234,.12));
    }

    /* Layout */
    .app{
      height:100%;
      max-width: 920px;
      margin: 0 auto;
      padding: 14px 14px 90px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    header{
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      min-width: 240px;
    }
    .brand .dot{
      width:14px;height:14px;border-radius:50%;
      background: var(--accent);
      box-shadow: 0 10px 20px rgba(15,23,42,.10);
    }
    .brand h1{margin:0;font-size:14px;letter-spacing:.2px}
    .brand small{display:block;margin-top:2px;color:var(--muted);font-size:12px}
    .status{
      font-size:12px; color:var(--muted);
      border:1px solid var(--line);
      background: rgba(255,255,255,.9);
      padding:8px 10px;
      border-radius: 999px;
      max-width: 52%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    /* Chat */
    .panel{
      flex:1;
      min-height:0;
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.9);
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .panel-head{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .panel-head .title{
      font-weight:700;
      font-size:13px;
    }
    .panel-head .hint{
      color:var(--muted);
      font-size:12px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .messages{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .msg{
      max-width: 92%;
      padding:10px 12px;
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.98);
      line-height:1.6;
      font-size:13px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .msg.user{
      margin-left:auto;
      background: linear-gradient(135deg, rgba(173,205,234,.38), rgba(255,255,255,.98));
    }
    .msg.ai{
      margin-right:auto;
      border-left: 3px solid rgba(173,205,234,.9);
    }
    .composer{
      padding:12px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      align-items:flex-end;
    }
    textarea{
      width:100%;
      resize:none;
      border:1px solid var(--line);
      border-radius: 14px;
      padding:10px 12px;
      background: rgba(255,255,255,.98);
      outline:none;
      font-family: var(--sans);
      font-size:13px;
      line-height:1.5;
      max-height: 180px;
    }
    .btn{
      height:40px;
      padding: 0 14px;
      border-radius: 14px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.98);
      cursor:pointer;
      color:var(--ink);
      user-select:none;
      transition: transform .04s ease, background .15s ease;
      white-space:nowrap;
      font-size:13px;
    }
    .btn:hover{background:#fff}
    .btn:active{transform: translateY(1px)}
    .btn.primary{
      background: linear-gradient(135deg, rgba(173,205,234,.95), rgba(255,255,255,.98));
      border-color: rgba(15,23,42,.10);
    }

    /* Floating ball */
    .ball{
      position: fixed;
      right: 16px;
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.95), rgba(173,205,234,.9));
      border: 1px solid rgba(15,23,42,.10);
      box-shadow: 0 16px 40px rgba(15,23,42,.18);
      display:grid;
      place-items:center;
      z-index: 50;
      touch-action: none;
      cursor: pointer;
    }
    .ball::after{
      content:"";
      width: 18px; height: 18px;
      border-radius: 6px;
      border: 2px solid rgba(15,23,42,.18);
      background: rgba(255,255,255,.65);
    }

    /* Overlay panel */
    .overlay{
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.30);
      backdrop-filter: blur(6px);
      z-index: 60;
      display:none;
    }
    .overlay.show{display:block;}
    .sheet{
      position:absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      max-width: 920px;
      margin: 0 auto;
      border-radius: 18px;
      background: rgba(255,255,255,.96);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .sheet-head{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .tabs{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    .tab{
      padding:8px 10px;
      border-radius: 999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.98);
      font-size:12px;
      cursor:pointer;
    }
    .tab.active{
      background: linear-gradient(135deg, rgba(173,205,234,.70), rgba(255,255,255,.98));
      border-color: rgba(15,23,42,.10);
      font-weight:700;
    }
    .sheet-close{
      border:1px solid var(--line);
      background: rgba(255,255,255,.98);
      border-radius: 12px;
      padding:8px 10px;
      cursor:pointer;
      font-size:12px;
    }
    .sheet-body{
      padding:12px;
      max-height: 72vh;
      overflow:auto;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }
    .field{
      border:1px solid var(--line);
      border-radius: 14px;
      padding:10px 12px;
      background: rgba(255,255,255,.98);
    }
    .field label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .field input, .field select{
      width:100%;
      border:1px solid rgba(15,23,42,.10);
      border-radius: 12px;
      padding:10px 10px;
      outline:none;
      background:#fff;
      font-size:13px;
    }
    .field .row{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
    }
    .field .row > *{flex:1}
    .hint2{font-size:12px;color:var(--muted);line-height:1.55}
    .mono{font-family: var(--mono); font-size:12px}

    /* Notebook */
    .nb{
      display:grid;
      grid-template-columns: 1fr 1.2fr;
      gap:10px;
      min-height: 320px;
    }
    .card{
      border:1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.98);
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .card-head{
      padding:10px 10px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .card-head .t{font-weight:700;font-size:12px}
    .list{min-height:0; overflow:auto; padding:6px;}
    .note-item{
      display:flex;
      gap:8px;
      align-items:flex-start;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(15,23,42,.08);
      margin: 6px 0;
      background:#fff;
      cursor:pointer;
    }
    .note-item.active{
      outline: 2px solid rgba(173,205,234,.75);
      border-color: rgba(173,205,234,.35);
    }
    .note-item .meta{flex:1; min-width:0;}
    .note-item .meta .name{font-weight:700;font-size:12px; overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .note-item .meta .sub{font-size:12px;color:var(--muted); overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .note-item input{margin-top:2px}
    .editor-wrap{padding:10px; display:flex; flex-direction:column; gap:8px; min-height:0;}
    .editor-wrap input{
      width:100%;
      padding:10px 10px;
      border-radius: 12px;
      border:1px solid rgba(15,23,42,.10);
      outline:none;
      font-size:13px;
      background:#fff;
    }
    .editor-wrap textarea{
      flex:1;
      min-height: 180px;
      border-radius: 12px;
      border:1px solid rgba(15,23,42,.10);
    }
    .row-actions{display:flex; gap:10px; flex-wrap:wrap;}

    @media (max-width: 760px){
      .nb{grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="dot" aria-hidden="true"></div>
        <div>
          <h1>小手机 · BYOK Chat</h1>
          <small>蓝白主题 · 悬浮球设置 · 笔记本上下文</small>
        </div>
      </div>
      <div class="status" id="status">未配置 API（点右下悬浮球）</div>
    </header>

    <section class="panel">
      <div class="panel-head">
        <div class="title">对话</div>
        <div class="hint" id="ctxHint">上下文：未启用笔记</div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="composer">
        <textarea id="input" rows="2" placeholder="输入消息…（⌘/Ctrl + Enter 发送）"></textarea>
        <button class="btn primary" id="send">发送</button>
      </div>
    </section>
  </div>

  <!-- Floating ball -->
  <div class="ball" id="ball" aria-label="打开设置"></div>

  <!-- Overlay -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true">
    <div class="sheet">
      <div class="sheet-head">
        <div class="tabs">
          <button class="tab active" data-tab="settings">设置</button>
          <button class="tab" data-tab="notebook">笔记本</button>
          <button class="tab" data-tab="data">数据</button>
        </div>
        <button class="sheet-close" id="close">关闭</button>
      </div>

      <div class="sheet-body">
        <!-- Settings -->
        <div class="tabpane" id="tab-settings">
          <div class="grid">
            <div class="field">
              <label>API Base URL（不含末尾 / ）</label>
              <input id="apiBase" placeholder="https://your-proxy.example.com" />
              <div class="hint2" style="margin-top:8px;">
                默认请求：<span class="mono">POST {BaseURL}/v1/chat/completions</span>
              </div>
            </div>

            <div class="field">
              <label>API Key（仅保存在你的浏览器本地）</label>
              <input id="apiKey" placeholder="sk-..." autocomplete="off" />
              <div class="hint2" style="margin-top:8px;">
                提示：公开分享页面时不要预填。每个使用者自己填写自己的 Key。
              </div>
            </div>

            <div class="field">
              <div class="row">
                <div>
                  <label>Model</label>
                  <input id="model" placeholder="gpt-4o-mini / gpt-4.1-mini / 你的中转站模型名" />
                </div>
                <div>
                  <label>Temperature</label>
                  <input id="temp" type="number" min="0" max="2" step="0.1" />
                </div>
              </div>
            </div>

            <div class="field">
              <label>System Prompt（可选）</label>
              <textarea id="sys" rows="4" placeholder="例如：你是一个温柔且高效的助手…"></textarea>
            </div>

            <div class="field">
              <div class="row-actions">
                <button class="btn" id="test">测试连接</button>
                <button class="btn" id="save">保存设置</button>
                <button class="btn" id="wipeKey">清除 Key</button>
              </div>
              <div class="hint2" style="margin-top:8px;" id="testResult">未测试</div>
            </div>
          </div>
        </div>

        <!-- Notebook -->
        <div class="tabpane" id="tab-notebook" style="display:none;">
          <div class="nb">
            <div class="card">
              <div class="card-head">
                <div class="t">笔记列表（勾选=作为上下文）</div>
                <button class="btn" id="addNote" style="height:32px;">新增</button>
              </div>
              <div class="list" id="noteList"></div>
            </div>

            <div class="card">
              <div class="card-head">
                <div class="t">编辑</div>
                <div style="display:flex; gap:8px;">
                  <button class="btn" id="delNote" style="height:32px;">删除</button>
                  <button class="btn primary" id="saveNote" style="height:32px;">保存</button>
                </div>
              </div>

              <div class="editor-wrap">
                <input id="noteTitle" placeholder="标题" />
                <textarea id="noteBody" placeholder="在这里写你的笔记/代码片段…（会被作为上下文喂给 AI）"></textarea>
                <div class="hint2">
                  说明：这不是“让 AI 改功能代码”。只是把你写的内容作为对话上下文，让它读得到。
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Data -->
        <div class="tabpane" id="tab-data" style="display:none;">
          <div class="grid">
            <div class="field">
              <label>导出（设置 + 笔记 + 聊天记录）</label>
              <button class="btn" id="export">导出 JSON</button>
              <div class="hint2" style="margin-top:8px;">
                导出的 JSON 不包含你的 Key（除非你选择包含；本页面默认不导出 Key）。
              </div>
            </div>

            <div class="field">
              <label>导入 JSON</label>
              <input id="importFile" type="file" accept="application/json" />
              <div class="hint2" style="margin-top:8px;">
                导入会覆盖本机当前数据。
              </div>
            </div>

            <div class="field">
              <label>清空</label>
              <div class="row-actions">
                <button class="btn" id="clearChat">清空聊天</button>
                <button class="btn" id="clearNotes">清空笔记</button>
                <button class="btn" id="clearAll">清空全部（含设置）</button>
              </div>
            </div>
          </div>
        </div>

      </div><!-- sheet-body -->
    </div><!-- sheet -->
  </div><!-- overlay -->

  <script>
    const $ = (s)=>document.querySelector(s);

    const STORAGE = {
      settings: "mini_phone_settings_v1",
      notes: "mini_phone_notes_v1",
      chat: "mini_phone_chat_v1",
      ball: "mini_phone_ball_v1",
    };

    const els = {
      status: $("#status"),
      ctxHint: $("#ctxHint"),
      messages: $("#messages"),
      input: $("#input"),
      send: $("#send"),

      ball: $("#ball"),
      overlay: $("#overlay"),
      close: $("#close"),
      tabs: document.querySelectorAll(".tab"),
      panes: {
        settings: $("#tab-settings"),
        notebook: $("#tab-notebook"),
        data: $("#tab-data"),
      },

      apiBase: $("#apiBase"),
      apiKey: $("#apiKey"),
      model: $("#model"),
      temp: $("#temp"),
      sys: $("#sys"),
      test: $("#test"),
      save: $("#save"),
      wipeKey: $("#wipeKey"),
      testResult: $("#testResult"),

      noteList: $("#noteList"),
      addNote: $("#addNote"),
      delNote: $("#delNote"),
      saveNote: $("#saveNote"),
      noteTitle: $("#noteTitle"),
      noteBody: $("#noteBody"),

      export: $("#export"),
      importFile: $("#importFile"),
      clearChat: $("#clearChat"),
      clearNotes: $("#clearNotes"),
      clearAll: $("#clearAll"),
    };

    function nowId(){
      return "n_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,8);
    }

    function loadJSON(key, fallback){
      try{
        const t = localStorage.getItem(key);
        if(!t) return fallback;
        return JSON.parse(t);
      }catch(e){ return fallback; }
    }
    function saveJSON(key, val){
      localStorage.setItem(key, JSON.stringify(val));
    }

    function getSettings(){
      return loadJSON(STORAGE.settings, {
        apiBase: "",
        apiKey: "",
        model: "",
        temperature: 0.2,
        system: "",
      });
    }
    function setSettings(patch){
      const s = getSettings();
      const next = { ...s, ...patch };
      saveJSON(STORAGE.settings, next);
      return next;
    }

    function getNotes(){
      return loadJSON(STORAGE.notes, {
        activeId: null,
        items: []
      });
    }
    function setNotes(next){
      saveJSON(STORAGE.notes, next);
      return next;
    }

    function getChat(){
      return loadJSON(STORAGE.chat, []);
    }
    function setChat(list){
      saveJSON(STORAGE.chat, list);
      return list;
    }

    function addMsg(role, content){
      const chat = getChat();
      chat.push({ role, content, ts: Date.now() });
      setChat(chat);
      renderChat();
    }

    function renderChat(){
      const chat = getChat();
      els.messages.innerHTML = "";
      for(const m of chat){
        const div = document.createElement("div");
        div.className = "msg " + (m.role === "user" ? "user" : "ai");
        div.textContent = m.content;
        els.messages.appendChild(div);
      }
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function selectedNotesText(){
      const nb = getNotes();
      const selected = nb.items.filter(x => x.enabled);
      if(!selected.length) return "";
      // Keep simple & deterministic
      return selected.map((n, idx) =>
        `[#${idx+1} ${n.title || "未命名"}]\n${n.body || ""}`
      ).join("\n\n");
    }

    function renderCtxHint(){
      const nb = getNotes();
      const count = nb.items.filter(x=>x.enabled).length;
      els.ctxHint.textContent = count ? `上下文：已启用 ${count} 条笔记` : "上下文：未启用笔记";
    }

    function renderStatus(){
      const s = getSettings();
      const ok = !!(s.apiBase && s.apiKey && s.model);
      if(ok){
        els.status.textContent = `已配置：${s.apiBase} · ${s.model}`;
      }else{
        els.status.textContent = "未配置 API（点右下悬浮球）";
      }
    }

    function renderSettingsForm(){
      const s = getSettings();
      els.apiBase.value = s.apiBase || "";
      els.apiKey.value = s.apiKey || "";
      els.model.value = s.model || "";
      els.temp.value = String(s.temperature ?? 0.2);
      els.sys.value = s.system || "";
    }

    function renderNotes(){
      const nb = getNotes();
      els.noteList.innerHTML = "";

      for(const n of nb.items){
        const item = document.createElement("div");
        item.className = "note-item" + (n.id === nb.activeId ? " active":"");
        item.innerHTML = `
          <input type="checkbox" ${n.enabled ? "checked":""} aria-label="作为上下文"/>
          <div class="meta">
            <div class="name"></div>
            <div class="sub"></div>
          </div>
        `;
        item.querySelector(".name").textContent = n.title || "未命名";
        item.querySelector(".sub").textContent = (n.body || "").slice(0, 50).replace(/\s+/g," ").trim() || "（空）";

        const cb = item.querySelector("input");
        cb.addEventListener("click", (e)=>{
          e.stopPropagation();
          const next = getNotes();
          const it = next.items.find(x=>x.id===n.id);
          if(it) it.enabled = cb.checked;
          setNotes(next);
          renderCtxHint();
        });

        item.addEventListener("click", ()=>{
          const next = getNotes();
          next.activeId = n.id;
          setNotes(next);
          loadActiveNoteIntoEditor();
          renderNotes();
        });

        els.noteList.appendChild(item);
      }

      renderCtxHint();
    }

    function loadActiveNoteIntoEditor(){
      const nb = getNotes();
      const cur = nb.items.find(x=>x.id===nb.activeId);
      els.noteTitle.value = cur?.title || "";
      els.noteBody.value = cur?.body || "";
    }

    function ensureActiveNote(){
      const nb = getNotes();
      if(nb.activeId && nb.items.some(x=>x.id===nb.activeId)) return nb;
      if(nb.items.length){
        nb.activeId = nb.items[0].id;
        setNotes(nb);
        return nb;
      }
      // create one
      const id = nowId();
      nb.items.unshift({ id, title:"第一条笔记", body:"", enabled:true, updated: Date.now() });
      nb.activeId = id;
      setNotes(nb);
      return nb;
    }

    /* API call: OpenAI-compatible chat/completions */
    async function callChatCompletions({ apiBase, apiKey, model, temperature, system, messages }){
      const url = apiBase.replace(/\/+$/,"") + "/v1/chat/completions";
      const payload = {
        model,
        temperature,
        messages
      };

      const r = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + apiKey
        },
        body: JSON.stringify(payload)
      });

      if(!r.ok){
        const t = await r.text().catch(()=> "");
        throw new Error(`API 请求失败：${r.status} ${t}`);
      }
      const data = await r.json();
      const text = data?.choices?.[0]?.message?.content;
      if(typeof text !== "string") throw new Error("响应解析失败（未拿到 content）");
      return text;
    }

    function buildMessagesForApi(userText){
      const s = getSettings();
      const ctx = selectedNotesText();

      let sys = (s.system || "").trim();
      if(ctx){
        sys = (sys ? sys + "\n\n" : "") + "以下是用户提供的笔记（作为上下文参考）：\n\n" + ctx;
      }

      const chat = getChat();
      const history = chat.map(m => ({ role: m.role === "ai" ? "assistant" : "user", content: m.content }));

      const msgs = [];
      if(sys) msgs.push({ role:"system", content: sys });
      msgs.push(...history);
      msgs.push({ role:"user", content: userText });
      return msgs;
    }

    async function onSend(){
      const text = els.input.value.trim();
      if(!text) return;

      const s = getSettings();
      if(!(s.apiBase && s.apiKey && s.model)){
        addMsg("ai", "先在悬浮球里把 API Base URL / Key / Model 配好。");
        return;
      }

      els.input.value = "";
      addMsg("user", text);

      els.send.disabled = true;
      els.send.textContent = "发送中…";
      try{
        const messages = buildMessagesForApi(text);
        const reply = await callChatCompletions({
          apiBase: s.apiBase,
          apiKey: s.apiKey,
          model: s.model,
          temperature: Number(s.temperature ?? 0.2),
          system: s.system || "",
          messages
        });
        addMsg("ai", reply);
      }catch(e){
        addMsg("ai", "错误：" + (e?.message || String(e)));
      }finally{
        els.send.disabled = false;
        els.send.textContent = "发送";
      }
    }

    /* Overlay / Tabs */
    function openOverlay(){ els.overlay.classList.add("show"); }
    function closeOverlay(){ els.overlay.classList.remove("show"); }

    function setTab(name){
      els.tabs.forEach(t => t.classList.toggle("active", t.dataset.tab === name));
      Object.entries(els.panes).forEach(([k, el]) => {
        el.style.display = (k === name) ? "block" : "none";
      });
      if(name === "notebook"){
        ensureActiveNote();
        renderNotes();
        loadActiveNoteIntoEditor();
      }
    }

    /* Floating ball drag */
    function loadBallPos(){
      return loadJSON(STORAGE.ball, null);
    }
    function saveBallPos(pos){
      saveJSON(STORAGE.ball, pos);
    }
    function applyBallPos(x,y){
      els.ball.style.left = x + "px";
      els.ball.style.top = y + "px";
      els.ball.style.right = "auto";
      els.ball.style.bottom = "auto";
    }

    function snapToEdge(){
      const rect = els.ball.getBoundingClientRect();
      const vw = window.innerWidth;
      const margin = 10;
      const x = (rect.left + rect.width/2 < vw/2) ? margin : (vw - rect.width - margin);
      const y = Math.min(Math.max(rect.top, margin), window.innerHeight - rect.height - margin);
      applyBallPos(x, y);
      saveBallPos({ x, y });
    }

    let drag = { on:false, dx:0, dy:0, moved:false };
    els.ball.addEventListener("pointerdown", (e)=>{
      drag.on = true;
      drag.moved = false;
      els.ball.setPointerCapture(e.pointerId);
      const r = els.ball.getBoundingClientRect();
      drag.dx = e.clientX - r.left;
      drag.dy = e.clientY - r.top;
    });
    els.ball.addEventListener("pointermove", (e)=>{
      if(!drag.on) return;
      drag.moved = true;
      const margin = 6;
      const x = Math.min(Math.max(e.clientX - drag.dx, margin), window.innerWidth - 56 - margin);
      const y = Math.min(Math.max(e.clientY - drag.dy, margin), window.innerHeight - 56 - margin);
      applyBallPos(x, y);
    });
    els.ball.addEventListener("pointerup", ()=>{
      if(drag.on){
        drag.on = false;
        snapToEdge();
      }
    });
    els.ball.addEventListener("click", ()=>{
      // click after drag shouldn't open
      if(drag.moved) return;
      openOverlay();
    });

    window.addEventListener("resize", ()=>{
      // keep in safe area
      const pos = loadBallPos();
      if(pos) snapToEdge();
    });

    /* Settings actions */
    els.save.addEventListener("click", ()=>{
      setSettings({
        apiBase: els.apiBase.value.trim(),
        apiKey: els.apiKey.value.trim(),
        model: els.model.value.trim(),
        temperature: Number(els.temp.value || 0.2),
        system: els.sys.value
      });
      renderStatus();
      els.testResult.textContent = "已保存。";
    });

    els.wipeKey.addEventListener("click", ()=>{
      setSettings({ apiKey: "" });
      renderSettingsForm();
      renderStatus();
      els.testResult.textContent = "已清除 Key（仅本机）。";
    });

    els.test.addEventListener("click", async ()=>{
      const apiBase = els.apiBase.value.trim();
      const apiKey = els.apiKey.value.trim();
      const model = els.model.value.trim();
      const temperature = Number(els.temp.value || 0.2);
      const system = els.sys.value || "";

      if(!(apiBase && apiKey && model)){
        els.testResult.textContent = "请先填写 Base URL / Key / Model。";
        return;
      }
      els.test.disabled = true;
      els.test.textContent = "测试中…";
      els.testResult.textContent = "请求中…";
      try{
        const reply = await callChatCompletions({
          apiBase, apiKey, model, temperature,
          system,
          messages: [
            ...(system.trim()? [{ role:"system", content: system.trim() }] : []),
            { role:"user", content:"回复一个 OK（测试连接）" }
          ]
        });
        els.testResult.textContent = "成功：" + reply.slice(0,80).replace(/\s+/g," ").trim();
      }catch(e){
        els.testResult.textContent = "失败：" + (e?.message || String(e));
      }finally{
        els.test.disabled = false;
        els.test.textContent = "测试连接";
      }
    });

    /* Notes actions */
    els.addNote.addEventListener("click", ()=>{
      const nb = getNotes();
      const id = nowId();
      nb.items.unshift({ id, title:"新笔记", body:"", enabled:true, updated: Date.now() });
      nb.activeId = id;
      setNotes(nb);
      renderNotes();
      loadActiveNoteIntoEditor();
    });

    els.saveNote.addEventListener("click", ()=>{
      const nb = ensureActiveNote();
      const cur = nb.items.find(x=>x.id===nb.activeId);
      if(!cur) return;
      cur.title = els.noteTitle.value.trim();
      cur.body = els.noteBody.value;
      cur.updated = Date.now();
      setNotes(nb);
      renderNotes();
    });

    els.delNote.addEventListener("click", ()=>{
      const nb = getNotes();
      if(!nb.activeId) return;
      const idx = nb.items.findIndex(x=>x.id===nb.activeId);
      if(idx < 0) return;
      nb.items.splice(idx, 1);
      nb.activeId = nb.items[0]?.id || null;
      setNotes(nb);
      ensureActiveNote();
      renderNotes();
      loadActiveNoteIntoEditor();
    });

    /* Data actions */
    els.export.addEventListener("click", ()=>{
      const settings = getSettings();
      // 默认不导出 Key
      const safeSettings = { ...settings, apiKey: "" };

      const payload = {
        version: 1,
        exportedAt: new Date().toISOString(),
        settings: safeSettings,
        notes: getNotes(),
        chat: getChat(),
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "mini-phone-export.json";
      a.click();
      URL.revokeObjectURL(a.href);
    });

    els.importFile.addEventListener("change", async (e)=>{
      const file = e.target.files?.[0];
      if(!file) return;
      const text = await file.text();
      const data = JSON.parse(text);

      if(data?.settings) saveJSON(STORAGE.settings, { ...getSettings(), ...data.settings, apiKey: getSettings().apiKey || "" });
      if(data?.notes) saveJSON(STORAGE.notes, data.notes);
      if(data?.chat) saveJSON(STORAGE.chat, data.chat);

      renderSettingsForm();
      renderStatus();
      renderNotes();
      renderChat();
      e.target.value = "";
    });

    els.clearChat.addEventListener("click", ()=>{ setChat([]); renderChat(); });
    els.clearNotes.addEventListener("click", ()=>{ setNotes({ activeId:null, items:[] }); ensureActiveNote(); renderNotes(); loadActiveNoteIntoEditor(); });
    els.clearAll.addEventListener("click", ()=>{
      localStorage.removeItem(STORAGE.settings);
      localStorage.removeItem(STORAGE.notes);
      localStorage.removeItem(STORAGE.chat);
      localStorage.removeItem(STORAGE.ball);
      location.reload();
    });

    /* UI */
    els.send.addEventListener("click", onSend);
    els.input.addEventListener("keydown", (e)=>{
      if((e.ctrlKey || e.metaKey) && e.key === "Enter") onSend();
    });

    els.close.addEventListener("click", closeOverlay);
    els.overlay.addEventListener("click", (e)=>{
      if(e.target === els.overlay) closeOverlay();
    });

    els.tabs.forEach(btn => btn.addEventListener("click", ()=> setTab(btn.dataset.tab)));

    // Init
    (function init(){
      renderChat();

      renderSettingsForm();
      renderStatus();

      ensureActiveNote();
      renderNotes();
      loadActiveNoteIntoEditor();

      const pos = loadBallPos();
      if(pos && typeof pos.x === "number" && typeof pos.y === "number"){
        applyBallPos(pos.x, pos.y);
        snapToEdge();
      }else{
        // default right-bottom-ish; keep fixed layout until first drag
        // (no-op)
      }
    })();
  </script>
</body>
</html>
