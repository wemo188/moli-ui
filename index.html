<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Starlet</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&family=Noto+Sans+SC:wght@100;300;400;500;700;900&family=LXGW+WenKai:wght@300;400;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<script>
(function(){
  var v = Date.now();
  var css = [
    'base.css','panels.css','frost.css','character.css','worldbook.css',
    'chat.css','preset.css','calendar.css','dock.css',
    'cards.css','workshop.css','user.css','memory.css',
    'wechat.css','char-mgr.css','api.css','offline.css','bg.css'
  ];
  css.forEach(function(href){
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = href + '?v=' + v;
    document.head.appendChild(link);
  });
})();
</script>
</head>
<body style="opacity:0;transition:opacity .3s ease;">

<!-- ====== 背景层 ====== -->
<div id="bgSlider" class="bg-slider">
  <div id="bgLayer" class="bg-page"></div>
  <div id="bgLayer1" class="bg-page"></div>
</div>

<!-- ====== 主页面 ====== -->
<main id="mainContent" class="main-content page-slider-main">
  <div id="pageSlider" class="page-slider">

   <!-- 🌟 第一页 🌟 -->
   <section class="screen-page screen-page-1">
      <div class="screen-page-inner">

        <!-- 新增顶部：灰线圆头像 + 右侧无边框文字框 -->
        <div class="alex-new-top">
          <div class="alex-avatar-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </div>
          <div class="alex-top-inputs">
            <input type="text" class="alex-input" placeholder="设定一个昵称">
            <input type="text" class="alex-input" placeholder="随便写点什么...">
          </div>
        </div>

        <!-- 照片墙：同色系虚线框 -->
        <div class="alex-photo-row">
          <div class="alex-photo-slot">+</div>
          <div class="alex-photo-slot">+</div>
          <div class="alex-photo-slot">+</div>
        </div>

        <!-- 2x2 图标 -->
        <div class="alex-icon-grid">
          <div class="alex-empty-half"></div>
          <div class="alex-icon-half card-group-icons" style="margin: 0; padding: 0;">
            <div id="iconChar">
              <div id="iconCharImg"></div>
              <div id="iconCharLabel">Char</div>
            </div>
            <div id="iconUser">
              <div id="iconUserImg"></div>
              <div id="iconUserLabel">User</div>
            </div>
            <div id="iconTheme">
              <div id="iconThemeImg"></div>
              <div id="iconThemeLabel">美化</div>
            </div>
            <div id="iconSettings">
              <div id="iconSettingsImg"></div>
              <div id="iconSettingsLabel">设置</div>
            </div>
          </div>
        </div>
        
        <!-- 双头像气泡聊天区域 -->
        <div id="hlAvatarsRow" class="hl-avatars-row">
          <div id="hlAvatarWrapLeft" class="hl-avatar-unit">
            <div class="hl-bubble hl-bubble-right">
              <div class="hl-bubble-arrow-outer"></div>
              <div class="hl-bubble-arrow-inner"></div>
              <span class="hl-bubble-display" id="hlInputLeft"></span>
            </div>
            <div class="hl-avatar" id="hlAvatarLeft" data-side="hlLeft">
              <div class="hl-avatar-inner">
                <svg class="hl-avatar-placeholder" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="15" r="6" stroke="#2a2a2a" stroke-width="2" fill="none"/><path d="M8 34C8 28 13 24 20 24C27 24 32 28 32 34" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
                <div class="hl-avatar-bg" id="hlImgLeft"></div>
              </div>
            </div>
            <div class="hl-chatbar hl-chatbar-bot">
              <span class="hl-chatbar-display" id="hlChatLeft" data-placeholder="说点什么..."></span>
            </div>
          </div>

          <div id="hlAvatarWrapRight" class="hl-avatar-unit">
            <div class="hl-bubble hl-bubble-left">
              <div class="hl-bubble-arrow-outer"></div>
              <div class="hl-bubble-arrow-inner"></div>
              <span class="hl-bubble-display" id="hlInputRight"></span>
            </div>
            <div class="hl-avatar" id="hlAvatarRight" data-side="hlRight">
              <div class="hl-avatar-inner">
                <svg class="hl-avatar-placeholder" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="15" r="6" stroke="#2a2a2a" stroke-width="2" fill="none"/><path d="M8 34C8 28 13 24 20 24C27 24 32 28 32 34" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
                <div class="hl-avatar-bg" id="hlImgRight"></div>
              </div>
            </div>
            <div class="hl-chatbar hl-chatbar-bl">
              <span class="hl-chatbar-display" id="hlChatRight" data-placeholder="说点什么..."></span>
            </div>
          </div>
        </div>

        <!-- 文本框 -->
        <div id="edenCard">
          <div id="edenText">文字填写区域，可以多行</div>
        </div>

      </div>
   </section>

   <!-- 🌟 第二页 🌟 -->
   <section class="screen-page screen-page-2">
      <div class="screen-page-inner" style="position:relative; height:100%; padding:0;">
        <div class="page2-scroll-wrapper">

          <!-- 日历票券 -->
          <div id="row0" style="margin-top: 10px; width: calc(100% + 36px); margin-left: -18px;">
            <div class="tk17" id="wtCard">
              <div class="tk17-bgimg" id="tkBgArea"></div>
              <div class="tk17-glass" id="tkGlass">
                <div class="tk17-stripes"></div>
              </div>
              <div class="tk17-left">
                <div class="tk17-profile-area">
                  <div class="tk17-avatar" id="tkAvatarBg"></div>
                  <div class="tk17-name-loc">
                    <div class="tk17-msg-name" id="tkMsgName">昵称</div>
                    <div class="tk17-msg-loc">
                      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
                      <span id="tkMsgLoc">地点</span>
                    </div>
                  </div>
                </div>
                <div class="tk17-sign" id="tkMsgSign">签名</div>
                <div class="tk17-divider"></div>
                <div class="tk17-datetime">
                  <span id="calMonthDay">06/10</span>
                  <span id="calWeekday">Wednesday</span>
                  <span id="calClock">00:00:00</span>
                </div>
              </div>
              <div class="tk17-sep">
                <div class="tk17-notch-top"></div>
                <div class="tk17-notch-bot"></div>
              </div>
              <div class="tk17-right">
                <div id="wtWeatherBg" class="tk17-weather-layer"></div>
                <div class="tk17-right-info">
                  <div class="tk17-wt-temp" id="calTemp">--°C</div>
                  <div class="tk17-wt-desc" id="calWeatherDesc">未知</div>
                </div>
              </div>
              <div class="tk17-dashed"></div>
            </div>
          </div>

          <!-- 双卡片 -->
          <div id="row1" style="display:flex; flex-direction:column; gap:20px; align-items:center;">
            <div class="card-group card-group-left">
              <div class="bx-w" id="profileCard-L" data-side="left">
                <div class="bx-tag-wrap">
                  <div class="bx-tag bx-tag1 bx-tag-placeholder"></div>
                  <div class="bx-tag bx-tag2 bx-tag-placeholder"></div>
                </div>
                <div class="bx-cw"><div class="bx-cd">
                  <div class="bx-av-box"><div class="bx-av-front"><div class="bx-av-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>点击设置</span></div></div></div>
                  <div class="bx-name-bar">
                    <div class="bx-sub"></div>
                  </div>
                </div></div>
              </div>
            </div>

            <div class="card-group card-group-right">
              <div class="bx-w" id="profileCard-R" data-side="right">
                <div class="bx-cw"><div class="bx-cd">
                  <div class="bx-side-ribbon">
                    <div class="bx-ribbon-tab r1 bx-ribbon-placeholder"></div>
                    <div class="bx-ribbon-tab r2 bx-ribbon-placeholder"></div>
                  </div>
                  <div class="bx-av-box"><div class="bx-av-front"><div class="bx-av-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>点击设置</span></div></div></div>
                  <div class="bx-name-bar">
                    <div class="bx-sub"></div>
                  </div>
                </div></div>
              </div>
            </div>
          </div>

          <!-- 保留物件 -->
          <div id="puzzleCard" style="margin-top:10px;"></div>
          <div class="pixel-dialog" id="hlTextCard" style="max-width:320px;width:100%;">
            <div class="pixel-header">
              <div class="pixel-hearts">
                <div class="pixel-heart"><div class="ph-core"></div></div>
                <div class="pixel-heart"><div class="ph-core"></div></div>
                <div class="pixel-heart"><div class="ph-core"></div></div>
              </div>
              <div class="pixel-btns">
                <div class="pixel-btn minimize"></div>
                <div class="pixel-btn maximize"></div>
                <div class="pixel-btn close"></div>
              </div>
            </div>
            <div class="pixel-body">
              <div class="pixel-text-area">
                <span class="pixel-text-display" id="hlTextTop" data-placeholder="第一行..."></span>
                <div class="pixel-text-divider"></div>
                <span class="pixel-text-display" id="hlTextMid" data-placeholder="第二行..."></span>
              </div>
            </div>
          </div>
          
        </div>
      </div>
   </section>

  </div>
  <div class="screen-indicators">
    <button class="screen-dot active" type="button" data-screen="0"></button>
    <button class="screen-dot" type="button" data-screen="1"></button>
  </div>
</main>

<!-- ====== 底部栏 ====== -->
<div class="dock" id="dockBar">
  <div class="dock-item" id="dockChat">
    <div class="mk-card"></div>
  </div>
  <div class="dock-item" id="dockStory">
    <div class="mk-card"></div>
  </div>
  <div class="dock-item" id="dockCheckin">
    <div class="mk-card"></div>
  </div>
  <div class="dock-item" id="dockForum">
    <div class="mk-card"></div>
  </div>
</div>

<!-- ====== 悬浮球 ====== -->
<div id="floatingBall" class="floating-ball mascot-ball">
<img id="mascotImg" class="mascot-img" src="https://iili.io/Bbt1vK7.md.png" alt="mascot" draggable="false">
</div>

<!-- ====== 面板 ====== -->
<div id="fontPanel" class="half-panel hidden"></div>
<div id="bgPanel" class="half-panel hidden"></div>

<!-- ====== Toast ====== -->
<div id="toast" class="toast hidden"></div>

<!-- ====== JS 部分 ====== -->
<script>
(function() {
  function adjustPWABottomBar() {
    var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if (!isPWA) return;
    var div = document.createElement('div');
    div.style.cssText = 'position: fixed; bottom: env(safe-area-inset-bottom, 0px); visibility: hidden; height: 0;';
    document.body.appendChild(div);
    var bottomGap = parseFloat(getComputedStyle(div).bottom) || 0;
    document.body.removeChild(div);
    var indicator = document.querySelector('.screen-indicators');
    var dock = document.querySelector('.dock');
    if (bottomGap > 30) {
      if (indicator) indicator.style.bottom = '10px';
      if (dock) dock.style.bottom = '20px';
    } else if (bottomGap > 15) {
      if (indicator) indicator.style.bottom = '6px';
      if (dock) dock.style.bottom = '15px';
    } else {
      if (indicator) indicator.style.bottom = '4px';
      if (dock) dock.style.bottom = '25px';
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', adjustPWABottomBar);
  else adjustPWABottomBar();
  window.addEventListener('resize', adjustPWABottomBar);
})();
</script>

<script>
(function(){
  var v = Date.now();
  var files = [
    'script.js','theme.js','font.js','api.js','bg.js',
    'character.js','user.js','worldbook.js','preset.js',
    'chat.js','chatui.js','calendar.js','cards.js','frost.js','char-mgr.js',
    'workshop.js','wechat.js','dock.js','memory.js','offlineui.js','offline.js'
  ];
  var idx = 0;
  function loadNext(){
    if(idx >= files.length){
      if(document.readyState === 'complete' || document.readyState === 'interactive'){
        App.LS.onReady(function(){ App.init(); });
      } else {
        window.addEventListener('DOMContentLoaded', function(){ App.LS.onReady(function(){ App.init(); }); });
      }
      return;
    }
    var s = document.createElement('script');
    s.src = files[idx] + '?v=' + v;
    s.onload = function(){ idx++; loadNext(); };
    s.onerror = function(){ console.warn('加载失败: ' + files[idx]); idx++; loadNext(); };
    document.body.appendChild(s);
  }
  loadNext();
})();
</script>
</body>
</html>
