<style>
.mmg-fallback{
  width:100%;height:100%;
  position:relative;
  border-radius:16px;
  background:#fff;
  border:1px solid rgba(220,235,255,.55);
  box-shadow:0 14px 30px rgba(20,35,55,.14);
  overflow:hidden;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.mmg-fallback:before{
  content:"";
  position:absolute;inset:-45%;
  background:
    radial-gradient(closest-side at 52% 48%,rgba(79,121,166,.56),transparent 62%),
    radial-gradient(closest-side at 50% 55%,rgba(126,163,201,.36),transparent 64%),
    radial-gradient(closest-side at 60% 40%,rgba(223,231,243,.18),transparent 66%);
  filter:blur(14px);
  transform:rotate(-10deg);
  pointer-events:none;
}
.mmg-fallback:after{
  content:"";
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,rgba(255,255,255,.42),transparent 42%),
    linear-gradient(315deg,rgba(255,255,255,.20),transparent 44%);
  pointer-events:none;
  mix-blend-mode:screen;
  opacity:.82;
}
</style>

<script>
(function(){
  var v = Date.now();
  var css = [
    'base.css','panels.css','character.css','worldbook.css',
    'chat.css','preset.css','calendar.css','dock.css',
    'cards.css','workshop.css','user.css','memory.css',
    'wechat.css','char-mgr.css','api.css','offline.css'

  css.forEach(function(href){
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = href + '?v=' + v;
    document.head.appendChild(link);
  });
})();
</script>

<script>
function imgFallback(img){
  img.onerror = null;
  var d = document.createElement('div');
  d.className = 'mmg-fallback';
  var w = img.getAttribute('width') || (img.parentElement ? img.parentElement.offsetWidth : 0) || 80;
  var h = img.getAttribute('height') || (img.parentElement ? img.parentElement.offsetHeight : 0) || 80;
  d.style.width = w + 'px';
  d.style.height = h + 'px';
  img.replaceWith(d);
}
</script>

<script>
(function(){
  var v = Date.now();
  var files = [
    'script.js','theme.js','font.js','api.js','bg.js',
    'character.js','user.js','worldbook.js','preset.js',
    'chat.js','chatui.js','calendar.js','cards.js','frost.js','char-mgr.js',
    'workshop.js','wechat.js','dock.js','memory.js','offlineui.js','offline.js'
  ];
  var idx = 0;
  function loadNext(){
    if(idx >= files.length){
      if(document.readyState === 'complete' || document.readyState === 'interactive'){
        App.LS.onReady(function(){ App.init(); });
      } else {
        window.addEventListener('DOMContentLoaded', function(){
          App.LS.onReady(function(){ App.init(); });
        });
      }
      return;
    }
    var s = document.createElement('script');
    s.src = files[idx] + '?v=' + v;
    s.onload = function(){ idx++; loadNext(); };
    s.onerror = function(){ console.warn('加载失败: ' + files[idx]); idx++; loadNext(); };
    document.body.appendChild(s);
  }
  loadNext();
})();
</script>
