<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Pure AI Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-overlay"></div>

  <main class="app theme-blueblack" id="app">
    <section class="chat-shell" id="chatShell">
      <header class="chat-header">
        <div class="header-text">
          <div class="eyebrow">PURE AI INTERFACE</div>
          <h1>THIS SPACE BELONGS TO YOU.</h1>
          <p>连接你的模型，自定义布局、字体、背景与气质。</p>
        </div>
        <div class="header-decoration">
          <span class="star star-a"></span>
          <span class="star star-b"></span>
          <span class="star star-c"></span>
        </div>
      </header>

      <section class="chat-panel" id="chatPanel">
        <div class="message assistant">
          <div class="bubble">
            已为你准备好纯净界面。点击右侧悬浮球，填写 API 与模型配置后即可开始。
          </div>
        </div>

        <div class="message user">
          <div class="bubble">
            我希望 AI 能一键切换整个网页布局、字体和背景风格。
          </div>
        </div>
      </section>

      <form class="composer" id="chatForm">
        <button type="button" class="ghost-btn" id="clearChatBtn">清空</button>
        <textarea
          id="userInput"
          placeholder="输入你的内容，开始与 AI 对话"
          rows="1"
        ></textarea>
        <button type="submit" class="send-btn">发送</button>
      </form>
    </section>

    <aside class="side-actions">
      <button class="side-btn active"></button>
      <button class="side-btn"></button>
      <button class="side-btn"></button>
    </aside>
  </main>

  <button class="floating-ball" id="floatingBall" aria-label="打开控制面板">
    <span></span>
  </button>

  <section class="control-panel hidden" id="controlPanel">
    <div class="panel-card">
      <div class="panel-top">
        <h2>控制中心</h2>
        <button id="closePanelBtn" class="close-btn">关闭</button>
      </div>

      <div class="panel-scroll">
        <div class="panel-group">
          <label>配置名称</label>
          <input type="text" id="configName" placeholder="例如：我的中转站A" />
          <label>API 地址</label>
          <input type="text" id="apiUrl" placeholder="https://example.com/v1/chat/completions" />
          <label>API Key</label>
          <input type="password" id="apiKey" placeholder="输入你的 key" />
          <label>模型名称</label>
          <input type="text" id="modelName" placeholder="例如：gpt-4o-mini / claude / deepseek" />
          <label>系统提示词</label>
          <textarea id="systemPrompt" rows="3" placeholder="你是一个网页布局与视觉设计助手"></textarea>

          <div class="row-btns">
            <button id="saveConfigBtn" class="mini-btn" type="button">保存配置</button>
            <button id="loadConfigBtn" class="mini-btn" type="button">载入配置</button>
          </div>

          <label>已保存配置</label>
          <select id="savedConfigs"></select>
        </div>

        <div class="panel-group">
          <label>页面风格</label>
          <select id="themeSelector">
            <option value="theme-blueblack">蓝黑夜幕</option>
            <option value="theme-frost">冷雾玻璃</option>
            <option value="theme-deepsea">深海沉静</option>
          </select>

          <label>字体选择</label>
          <select id="fontSelector">
            <option value="system">系统默认</option>
            <option value="song">宋体风</option>
            <option value="lxwk">霞鹜文楷风</option>
            <option value="mashan">马善政手写</option>
            <option value="zhimang">知芒行草风</option>
          </select>

          <label>上传自定义字体</label>
          <input type="file" id="fontUpload" accept=".ttf,.otf,.woff,.woff2" />

          <label>上传背景图片</label>
          <input type="file" id="bgUpload" accept="image/*" />

          <div class="row-btns">
            <button id="removeBgBtn" class="mini-btn" type="button">移除背景</button>
            <button id="resetStyleBtn" class="mini-btn" type="button">重置样式</button>
          </div>
        </div>

        <div class="panel-group">
          <label>AI 布局与美化指令</label>
          <textarea
            id="styleCommand"
            rows="4"
            placeholder="例如：把页面改成更深的蓝黑玻璃感，气泡更圆，标题更克制，输入框更细长"
          ></textarea>
          <button id="applyAIDesignBtn" class="full-btn" type="button">让 AI 改变页面</button>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
