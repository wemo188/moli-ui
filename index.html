<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mono Space</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="panels.css">
  <link rel="stylesheet" href="character.css">
  <link rel="stylesheet" href="worldbook.css">
  <link rel="stylesheet" href="chat.css">
  <link rel="stylesheet" href="preset.css">
  <link rel="stylesheet" href="calendar.css">
  <link rel="stylesheet" href="dock.css">
  <link rel="stylesheet" href="cards.css">
  <link rel="stylesheet" href="drag.css">
  <link rel="stylesheet" href="frost.css">
</head>
<body>

<!-- ====== 背景层 ====== -->
<div id="bgLayer" class="bg-layer"></div>

<!-- ====== 主页面 ====== -->
<main id="mainContent" class="main-content page-slider-main">
  <div id="pageSlider" class="page-slider">

    <!-- 第一页 -->
    <section class="screen-page screen-page-1">
      <div class="screen-page-inner">
        <div class="wt-card" id="wtCard">
          <div class="wt-cw">
            <div class="vf-c tl"></div>
            <div class="vf-c tr"></div>
            <div class="vf-c bl"></div>
            <div class="vf-c br"></div>
            <div class="vf-grid"></div>
            <div class="vf-hl top"></div>
            <div class="vf-hl bot"></div>
            <div class="vf-lbl lt" id="wtSysBtn">SYSTEM ACTIVE</div>
            <div class="vf-lbl rt"><span id="location-coords">--°N --°E</span></div>

            <div class="wt-cd">
              <div class="wt-l" id="wtDateArea">
                <div class="wt-time">
                  <span id="wt-hh">--</span><span class="wt-colon">:</span><span id="wt-mm">--</span><span class="wt-sec" id="wt-ss">00</span>
                </div>
                <div class="wt-tl"></div>
                <div class="wt-date">
                  <span id="wt-fd">----年--月--日</span>
                  <span class="wt-wk" id="wt-wk">---</span>
                </div>
              </div>
              <div class="wt-vd"></div>
              <div class="wt-r" id="wtWeatherArea">
                <div class="wt-temp"><span id="wt-temp-val">--</span><span class="wt-deg">°C</span></div>
                <div class="wt-desc" id="wt-desc-val">--</div>
                <div class="wt-wl"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="card-row" id="cardRow"></div>
      </div>
    </section>

    <!-- 第二页 -->
    <section class="screen-page screen-page-2">
      <div class="screen-page-inner" style="position:relative;height:100%;">
        <div class="frost-card" id="frostCard"></div>

        <div class="app-grid" id="appGrid">
          <div class="app-icon" id="openCharacterBtn" data-icon="character">
            <div class="app-icon-img" id="characterIconImg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </div>
            <div class="app-icon-label">角色</div>
          </div>

          <div class="app-icon" id="openUserBtn" data-icon="user">
            <div class="app-icon-img" id="userIconImg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div class="app-icon-label">用户</div>
          </div>

          <div class="app-icon" id="openWorldBookBtn" data-icon="worldbook">
            <div class="app-icon-img" id="worldBookIconImg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                <path d="M8 7h8"/>
                <path d="M8 11h6"/>
              </svg>
            </div>
            <div class="app-icon-label">世界书</div>
          </div>

          <div class="app-icon" id="openPresetBtn" data-icon="preset">
            <div class="app-icon-img" id="presetIconImg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
            </div>
            <div class="app-icon-label">预设</div>
          </div>

          <div class="app-icon" id="openRegexBtn" data-icon="regex">
            <div class="app-icon-img" id="regexIconImg">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 17 10 11 4 5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
              </svg>
            </div>
            <div class="app-icon-label">正则</div>
          </div>
        </div>
      </div>
    </section>

  </div>
  <div class="screen-indicators">
    <button class="screen-dot active" type="button" data-screen="0"></button>
    <button class="screen-dot" type="button" data-screen="1"></button>
  </div>
</main>

<!-- ====== 底部栏 ====== -->
<div class="dock" id="dockBar">
  <div class="dock-item" id="dockMine">
    <div class="dock-icon"></div>
  </div>
  <div class="dock-item" id="dockLong">
    <div class="dock-icon"></div>
  </div>
  <div class="dock-item" id="dockShort">
    <div class="dock-icon"></div>
  </div>
  <div class="dock-item" id="dockCheck">
    <div class="dock-icon"></div>
  </div>
</div>

<!-- ====== 悬浮球 ====== -->
<div id="floatingBall" class="floating-ball mascot-ball">
  <img id="mascotImg" class="mascot-img" src="https://iili.io/BzMi2Jj.md.png" alt="mascot" draggable="false">
</div>

<!-- ====== 悬浮球菜单 ====== -->
<div id="ballMenu" class="ball-menu hidden">
  <div class="ball-menu-item" data-panel="apiPanel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    <span>API 配置</span>
  </div>

  <div class="ball-menu-item" data-panel="themePanel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a10 10 0 0 1 0 20"/>
      <path d="M2 12h20"/>
    </svg>
    <span>主题配色</span>
  </div>

  <div class="ball-menu-item" data-panel="fontPanel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 7V4h16v3"/>
      <path d="M9 20h6"/>
      <path d="M12 4v16"/>
    </svg>
    <span>字体设置</span>
  </div>

  <div class="ball-menu-item" data-panel="bgPanel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="9" cy="9" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <span>背景图片</span>
  </div>

  <div class="ball-menu-item" id="ballSettings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
      <line x1="9" y1="9" x2="9.01" y2="9"/>
      <line x1="15" y1="9" x2="15.01" y2="9"/>
    </svg>
    <span>悬浮球设置</span>
  </div>
</div>

<!-- ====== 遮罩层 ====== -->
<div id="overlay" class="overlay hidden"></div>

<!-- ====== 所有面板（必须在main外面） ====== -->

<!-- API 配置 -->
<div id="apiPanel" class="panel hidden">
  <div class="panel-header">
    <h2>API 配置</h2>
    <div class="panel-close" data-close="apiPanel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>
  <div class="panel-body">
    <div class="form-group">
      <label>配置名称</label>
      <input type="text" id="apiName" placeholder="例如：OpenAI 中转">
    </div>
    <div class="form-group">
      <label>API 地址</label>
      <input type="text" id="apiUrl" placeholder="https://example.com/v1">
    </div>
    <div class="form-group">
      <label>API Key</label>
      <div class="input-with-btn">
        <input type="password" id="apiKey" placeholder="sk-...">
        <button class="icon-btn" id="toggleKeyVisible" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label>模型</label>
      <div class="input-with-btn">
        <input type="text" id="apiModel" placeholder="gpt-4o / claude-sonnet-4-20250514">
        <button class="icon-btn" id="fetchModelsBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-6.22-8.56"/>
            <path d="M21 3v6h-6"/>
          </svg>
        </button>
      </div>
      <div id="modelList" class="model-list hidden"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="saveApiBtn" type="button">保存配置</button>
      <button class="btn btn-outline" id="testApiBtn" type="button">测试连接</button>
    </div>
    <div class="divider"></div>
    <div id="savedApis" class="saved-list"></div>
  </div>
</div>

<!-- 主题配色 -->
<div id="themePanel" class="panel hidden">
  <div class="panel-header">
    <h2>主题配色</h2>
    <div class="panel-close" data-close="themePanel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>
  <div class="panel-body">
    <div id="themeList" class="theme-list"></div>
    <div class="divider"></div>
    <div id="customThemeList" class="theme-list"></div>
    <div class="divider"></div>
    <div class="color-grid">
      <div class="color-group"><label>页面背景</label><input type="color" id="colorBg" value="#f0f6fb"></div>
      <div class="color-group"><label>卡片背景</label><input type="color" id="colorCard" value="#ffffff"></div>
      <div class="color-group"><label>主题色</label><input type="color" id="colorAccent" value="#adcdea"></div>
      <div class="color-group"><label>强调色</label><input type="color" id="colorAccentDeep" value="#8ab8de"></div>
      <div class="color-group"><label>文字色</label><input type="color" id="colorText" value="#1a1a1a"></div>
      <div class="color-group"><label>边框色</label><input type="color" id="colorBorder" value="#1a1a1a"></div>
    </div>
    <div class="form-group" style="margin-top:12px;">
      <input type="text" id="customThemeName" placeholder="主题名称">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="applyCustomColors" type="button">应用颜色</button>
      <button class="btn btn-outline" id="saveCustomTheme" type="button">保存主题</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-outline" id="resetTheme" style="width:100%;" type="button">恢复默认主题</button>
    <button class="btn btn-danger" id="clearAllBtn" style="width:100%;margin-top:8px;" type="button">重置所有设置</button>
  </div>
</div>

<!-- 字体设置 -->
<div id="fontPanel" class="panel hidden">
  <div class="panel-header">
    <h2>字体设置</h2>
    <div class="panel-close" data-close="fontPanel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>
  <div class="panel-body">
    <div id="fontList" class="font-list"></div>
    <div class="divider"></div>
    <div class="upload-area" id="fontUploadArea">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>上传字体文件</p>
      <input type="file" id="fontFileInput" accept=".ttf,.otf,.woff,.woff2" hidden>
    </div>
    <div id="customFonts" class="font-list"></div>
  </div>
</div>

<!-- 背景图片 -->
<div id="bgPanel" class="panel hidden">
  <div class="panel-header">
    <h2>背景图片</h2>
    <div class="panel-close" data-close="bgPanel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>
  <div class="panel-body">
    <div class="upload-area" id="bgUploadArea">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="9" cy="9" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
      <p>上传背景图片</p>
      <input type="file" id="bgFileInput" accept="image/*" hidden>
    </div>
    <div id="bgPreview" class="bg-preview hidden">
      <img id="bgPreviewImg" src="" alt="preview">
    </div>
    <div class="form-group">
      <label>模糊度</label>
      <input type="range" id="bgBlur" min="0" max="20" value="0">
      <span id="bgBlurVal">0px</span>
    </div>
    <div class="form-group">
      <label>暗度</label>
      <input type="range" id="bgDark" min="0" max="80" value="30">
      <span id="bgDarkVal">30%</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="applyBgBtn" type="button">应用背景</button>
      <button class="btn btn-outline" id="removeBgBtn" type="button">移除背景</button>
    </div>
  </div>
</div>

<!-- 日历面板 -->
<div id="calendarPanel" class="panel hidden">
  <div class="panel-header">
    <h2>日历</h2>
    <div class="panel-close" data-close="calendarPanel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>
  <div class="panel-body">
    <p style="color:var(--text-muted);text-align:center;padding:40px 0;">日历功能开发中...</p>
  </div>
</div>

<!-- 天气面板 -->
<div id="weatherPanel" class="panel hidden">
  <div class="panel-header">
    <h2>天气</h2>
    <div class="panel-close" data-close="weatherPanel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
  </div>
  <div class="panel-body">
    <p style="color:var(--text-muted);text-align:center;padding:40px 0;">天气详情开发中...</p>
  </div>
</div>

<!-- ====== Toast ====== -->
<div id="toast" class="toast hidden"></div>

<!-- ====== JS ====== -->
<script src="script.js"></script>
<script src="theme.js"></script>
<script src="font.js"></script>
<script src="api.js"></script>
<script src="bg.js"></script>
<script src="character.js"></script>
<script src="user.js"></script>
<script src="worldbook.js"></script>
<script src="preset.js"></script>
<script src="chat.js"></script>
<script src="calendar.js"></script>
<script src="cards.js"></script>
<script src="frost.js"></script>
<script src="drag.js"></script>
<script src="dock.js"></script>
</body>
</html>
