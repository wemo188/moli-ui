
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Starlet</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600;700;900&family=Noto+Sans+SC:wght@100;300;400;500;700;900&family=LXGW+WenKai:wght@300;400;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<script>
(function(){
  var v = Date.now();
  var css = [
    'base.css','panels.css','character.css','worldbook.css',
    'chat.css','preset.css','calendar.css','dock.css',
    'cards.css','workshop.css','user.css','memory.css',
    'wechat.css','char-mgr.css','api.css','offline.css'
  ];
  css.forEach(function(href){
    var link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = href + '?v=' + v;
    document.head.appendChild(link);
  });
})();
</script>
</head>
<body>

<!-- ====== 背景层 ====== -->
<div id="bgLayer" class="bg-layer"></div>

<!-- ====== 主页面 ====== -->
<main id="mainContent" class="main-content page-slider-main">
  <div id="pageSlider" class="page-slider">

    <!-- 第一页 -->
    <section class="screen-page screen-page-1">
      <div class="screen-page-inner" style="display:flex;flex-direction:column;min-height:100%;">

        <!-- 1. 两张角色卡并排 -->
        <div id="cardRow" style="display:flex;justify-content:center;align-items:flex-start;gap:30px;padding:10px 12px 0;width:100%;margin-top:5px;">
          <div class="bx-w" id="profileCard-L" data-side="left" style="width:190px;flex-shrink:0;">
            <div class="bx-tag-wrap">
              <div class="bx-tag bx-tag1 bx-tag-placeholder">标签</div>
              <div class="bx-tag bx-tag2 bx-tag-placeholder">标签</div>
            </div>
            <div class="bx-cw"><div class="bx-cd">
              <div class="bx-av-box"><div class="bx-av-front"><div class="bx-av-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>点击设置</span></div></div></div>
              <div class="bx-name-bar">
                <div class="bx-name bx-name-placeholder">角色名</div>
                <div class="bx-sub">✥同你奔赴…✥</div>
              </div>
            </div></div>
          </div>
          <div class="bx-w" id="profileCard-R" data-side="right" style="width:190px;flex-shrink:0;">
            <div class="bx-cw"><div class="bx-cd">
              <div class="bx-side-ribbon">
                <div class="bx-ribbon-tab r1 bx-ribbon-placeholder">标签</div>
                <div class="bx-ribbon-tab r2 bx-ribbon-placeholder">标签</div>
              </div>
              <div class="bx-av-box"><div class="bx-av-front"><div class="bx-av-placeholder"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>点击设置</span></div></div></div>
              <div class="bx-name-bar">
                <div class="bx-name bx-name-placeholder">角色名</div>
                <div class="bx-sub">◈与你共赏…◈</div>
              </div>
            </div></div>
          </div>
        </div>

        <div id="calTimeRow" style="display:flex;gap:10px;width:100%;margin-top:14px;padding:0 12px;">
  <div id="timeSide" style="width:40%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;">
    <div id="calYear"></div>
    <div id="calMonth"></div>
    <div id="calMonthEn"></div>
    <div id="calClock"><span id="calTime"></span><span id="calSec"></span></div>
  </div>
  <div id="calSide" style="width:60%;display:flex;flex-direction:column;padding:6px 4px;overflow:hidden;">
    <div id="calWeekdays" style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px;"></div>
    <div id="calDays"></div>
  </div>
</div>

        <!-- 3. 四个图标 -->
        <div id="appIconsRow" style="display:flex;justify-content:space-around;align-items:flex-start;gap:12px;margin-top:14px;padding:0 12px;width:100%;">
          <div id="iconUser" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">
            <div id="iconUserImg" style="width:80px;height:80px;border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;"></div>
            <div id="iconUserLabel" style="font-size:12.5px;text-align:center;letter-spacing:1px;font-weight:800;">User</div>
          </div>
          <div id="iconChar" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">
            <div id="iconCharImg" style="width:80px;height:80px;border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;"></div>
            <div id="iconCharLabel" style="font-size:12.5px;text-align:center;letter-spacing:1px;font-weight:800;">Char</div>
          </div>
          <div id="iconTheme" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">
            <div id="iconThemeImg" style="width:80px;height:80px;border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;"></div>
            <div id="iconThemeLabel" style="font-size:12.5px;text-align:center;letter-spacing:1px;font-weight:800;">美化</div>
          </div>
          <div id="iconSettings" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;">
            <div id="iconSettingsImg" style="width:80px;height:80px;border-radius:15px;overflow:hidden;display:flex;align-items:center;justify-content:center;"></div>
            <div id="iconSettingsLabel" style="font-size:12.5px;text-align:center;letter-spacing:1px;font-weight:800;">设置</div>
          </div>
        </div>

        <!-- 4. 圆头像+气泡 -->
        <div id="hlAvatarsRow" style="display:flex;align-items:flex-start;justify-content:center;gap:280px;margin-top:25px;width:max-content;margin-right:210px;">
          <div id="hlAvatarWrapRight" style="position:relative;display:flex;flex-direction:column;align-items:center;">
            <div class="hl-bubble hl-bubble-right">
              <div class="hl-bubble-arrow-outer"></div>
              <div class="hl-bubble-arrow-inner"></div>
              <span class="hl-bubble-display" id="hlInputRight"></span>
            </div>
            <div class="hl-avatar" id="hlAvatarRight" data-side="hlRight" style="width:65px;height:65px;border-radius:50%;border:1px solid #2a2a2a;background:white;display:flex;align-items:center;justify-content:center;padding:3px;cursor:pointer;">
              <div class="hl-avatar-inner" style="width:100%;height:100%;border-radius:50%;overflow:hidden;background:#f5f5f5;display:flex;align-items:center;justify-content:center;position:relative;">
                <svg class="hl-avatar-placeholder" viewBox="0 0 40 40" fill="none" style="width:24px;height:24px;position:absolute;z-index:1;">
                  <circle cx="20" cy="15" r="6" stroke="#2a2a2a" stroke-width="2" fill="none"/>
                  <path d="M8 34C8 28 13 24 20 24C27 24 32 28 32 34" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" fill="none"/>
                </svg>
                <div class="hl-avatar-bg" id="hlImgRight"></div>
              </div>
            </div>
            <div class="hl-chatbar hl-chatbar-bot" style="position:absolute;top:100%;left:100%;margin-top:-20px;border-radius:4px 18px 18px 18px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,0.06);padding:9px;white-space:nowrap;z-index:5;">
              <span class="hl-chatbar-display" id="hlChatRight" data-placeholder="说点什么..."></span>
            </div>
          </div>
          <div id="hlAvatarWrapLeft" style="position:relative;display:flex;flex-direction:column;align-items:center;">
            <div class="hl-bubble hl-bubble-left">
              <div class="hl-bubble-arrow-outer"></div>
              <div class="hl-bubble-arrow-inner"></div>
              <span class="hl-bubble-display" id="hlInputLeft"></span>
            </div>
            <div class="hl-avatar" id="hlAvatarLeft" data-side="hlLeft" style="width:65px;height:65px;border-radius:50%;border:1px solid #2a2a2a;background:white;display:flex;align-items:center;justify-content:center;padding:3px;cursor:pointer;">
              <div class="hl-avatar-inner" style="width:100%;height:100%;border-radius:50%;overflow:hidden;background:#f5f5f5;display:flex;align-items:center;justify-content:center;position:relative;">
                <svg class="hl-avatar-placeholder" viewBox="0 0 40 40" fill="none" style="width:24px;height:24px;position:absolute;z-index:1;">
                  <circle cx="20" cy="15" r="6" stroke="#2a2a2a" stroke-width="2" fill="none"/>
                  <path d="M8 34C8 28 13 24 20 24C27 24 32 28 32 34" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" fill="none"/>
                </svg>
                <div class="hl-avatar-bg" id="hlImgLeft"></div>
              </div>
            </div>
            <div class="hl-chatbar hl-chatbar-bl" style="position:absolute;top:100%;right:100%;margin-top:-83px;border-radius:18px 18px 4px 18px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 4px 16px rgba(0,0,0,0.06);padding:9px;white-space:nowrap;z-index:5;direction:rtl;">
              <span class="hl-chatbar-display" id="hlChatLeft" data-placeholder="说点什么..."></span>
            </div>
          </div>
        </div>

        <!-- 5. Eden文字卡片 -->
        <div id="edenCard" style="margin-top:20px;padding:0 12px;">
          <div id="edenText" style="font-size:38px;">文字填写区域，可以多行</div>
        </div>

      </div>
    </section>

    <!-- 第二页 -->
    <section class="screen-page screen-page-2">
      <div class="screen-page-inner" style="position:relative;height:100%;padding:12px;display:flex;align-items:center;justify-content:center;">
        <div class="pixel-dialog" id="hlTextCard" style="max-width:320px;width:100%;">
          <div class="pixel-header">
            <div class="pixel-hearts">
              <div class="pixel-heart"><div class="ph-core"></div></div>
              <div class="pixel-heart"><div class="ph-core"></div></div>
              <div class="pixel-heart"><div class="ph-core"></div></div>
            </div>
            <div class="pixel-btns">
              <div class="pixel-btn minimize"></div>
              <div class="pixel-btn maximize"></div>
              <div class="pixel-btn close"></div>
            </div>
          </div>
          <div class="pixel-body">
            <div class="pixel-text-area">
              <span class="pixel-text-display" id="hlTextTop" data-placeholder="第一行..."></span>
              <div class="pixel-text-divider"></div>
              <span class="pixel-text-display" id="hlTextMid" data-placeholder="第二行..."></span>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>
  <div class="screen-indicators">
    <button class="screen-dot active" type="button" data-screen="0"></button>
    <button class="screen-dot" type="button" data-screen="1"></button>
  </div>
</main>

<!-- ====== 底部栏 ====== -->
<div class="dock" id="dockBar">
  <div class="dock-item" id="dockChat">
    <div class="mk-card" style="width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;"></div>
  </div>
  <div class="dock-item" id="dockStory">
    <div class="mk-card" style="width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;"></div>
  </div>
  <div class="dock-item" id="dockCheckin">
    <div class="mk-card" style="width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;"></div>
  </div>
  <div class="dock-item" id="dockForum">
    <div class="mk-card" style="width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;"></div>
  </div>
</div>

<!-- ====== 悬浮球 ====== -->
<div id="floatingBall" class="floating-ball mascot-ball">
  <img id="mascotImg" class="mascot-img" src="https://iili.io/BzMi2Jj.md.png" alt="mascot" draggable="false">
</div>

<!-- ====== 面板 ====== -->
<div id="fontPanel" class="half-panel hidden"></div>
<div id="bgPanel" class="half-panel hidden"></div>

<!-- ====== Toast ====== -->
<div id="toast" class="toast hidden"></div>

<!-- ====== JS ====== -->
<script>
(function(){
  var v = Date.now();
  var files = [
    'script.js','theme.js','font.js','api.js','bg.js',
    'character.js','user.js','worldbook.js','preset.js',
    'chat.js','chatui.js','calendar.js','cards.js','frost.js','char-mgr.js',
    'workshop.js','wechat.js','dock.js','memory.js','offlineui.js','offline.js'
  ];
  var idx = 0;
  function loadNext(){
    if(idx >= files.length){
      if(document.readyState === 'complete' || document.readyState === 'interactive'){
        App.LS.onReady(function(){ App.init(); });
      } else {
        window.addEventListener('DOMContentLoaded', function(){
          App.LS.onReady(function(){ App.init(); });
        });
      }
      return;
    }
    var s = document.createElement('script');
    s.src = files[idx] + '?v=' + v;
    s.onload = function(){ idx++; loadNext(); };
    s.onerror = function(){ console.warn('加载失败: ' + files[idx]); idx++; loadNext(); };
    document.body.appendChild(s);
  }
  loadNext();
})();
</script>
</body>
</html>
