<script>
(function() {
  function adjustPWABottomBar() {
    var isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if (!isPWA) return;
    var div = document.createElement('div');
    div.style.cssText = 'position: fixed; bottom: env(safe-area-inset-bottom, 0px); visibility: hidden; height: 0;';
    document.body.appendChild(div);
    var bottomGap = parseFloat(getComputedStyle(div).bottom) || 0;
    document.body.removeChild(div);
    var indicator = document.querySelector('.screen-indicators');
    var dock = document.querySelector('.dock');
    if (bottomGap > 30) {
      if (indicator) indicator.style.bottom = '10px';
      if (dock) dock.style.bottom = '20px';
    } else if (bottomGap > 15) {
      if (indicator) indicator.style.bottom = '6px';
      if (dock) dock.style.bottom = '15px';
    } else {
      if (indicator) indicator.style.bottom = '4px';
      if (dock) dock.style.bottom = '25px';
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', adjustPWABottomBar);
  else adjustPWABottomBar();
  window.addEventListener('resize', adjustPWABottomBar);
})();
</script>

<script>
(function(){
  var v = Date.now();
  var files = [
    'script.js','theme.js','font.js','api.js','bg.js',
    'character.js','user.js','worldbook.js','preset.js',
    'chat.js','chatui.js','calendar.js','cards.js','frost.js','char-mgr.js',
    'workshop.js','wechat.js','dock.js','memory.js','offlineui.js','offline.js'
  ];
  var idx = 0;
  function loadNext(){
    if(idx >= files.length){
      if(document.readyState === 'complete' || document.readyState === 'interactive'){
        App.LS.onReady(function(){ App.init(); });
      } else {
        window.addEventListener('DOMContentLoaded', function(){ App.LS.onReady(function(){ App.init(); }); });
      }
      return;
    }
    var s = document.createElement('script');
    s.src = files[idx] + '?v=' + v;
    s.onload = function(){ idx++; loadNext(); };
    s.onerror = function(){ console.warn('加载失败: ' + files[idx]); idx++; loadNext(); };
    document.body.appendChild(s);
  }
  loadNext();
})();
</script>
