<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>墨墨 AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 背景图层 -->
<div id="bgLayer"></div>

<!-- 主容器 -->
<div id="app">

  <!-- 顶栏 -->
  <header id="header">
    <div class="header-left">
      <h1>墨墨 AI</h1>
    </div>
    <div class="header-right">
      <span id="statusDot"></span>
      <span id="statusText">未连接</span>
    </div>
  </header>

  <!-- 聊天区 -->
  <main id="chatArea">
    <div id="welcome">
      <div class="welcome-circle">
        <svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="#adcdea" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="24" cy="24" r="20" opacity=".4"/>
          <circle cx="24" cy="24" r="12" opacity=".7"/>
          <circle cx="24" cy="24" r="4"/>
        </svg>
      </div>
      <h2>你好呀</h2>
      <p>点击右下角悬浮球配置 API 开始对话</p>
    </div>
  </main>

  <!-- 输入区 -->
  <div id="inputArea">
    <div class="input-row">
      <textarea id="msgInput" rows="1" placeholder="说点什么..."></textarea>
      <button id="sendBtn" aria-label="发送">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- ============ 悬浮球 ============ -->
<div id="floatingBall" aria-label="菜单">
  <svg viewBox="0 0 40 40" width="22" height="22" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="20" cy="20" r="14" opacity=".5"/>
    <circle cx="20" cy="20" r="7"/>
    <circle cx="20" cy="20" r="2"/>
  </svg>
</div>

<!-- 悬浮球菜单 -->
<div id="ballMenu" class="hidden">
  <div class="menu-mask"></div>
  <div class="menu-body">
    <div class="menu-title">设置</div>
    <div class="menu-grid">
      <button class="menu-item" data-panel="apiPanel">
        <div class="mi-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#adcdea" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
        </div>
        <span>API 配置</span>
      </button>
      <button class="menu-item" data-panel="fontPanel">
        <div class="mi-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#adcdea" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 7 4 4 20 4 20 7"/>
            <line x1="9" y1="20" x2="15" y2="20"/>
            <line x1="12" y1="4" x2="12" y2="20"/>
          </svg>
        </div>
        <span>字体</span>
      </button>
      <button class="menu-item" data-panel="bgPanel">
        <div class="mi-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#adcdea" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <span>背景图</span>
      </button>
      <button class="menu-item" data-panel="themePanel">
        <div class="mi-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#adcdea" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26z"/>
          </svg>
        </div>
        <span>AI 美化</span>
      </button>
    </div>
    <button class="menu-close" id="menuCloseBtn">收起</button>
  </div>
</div>

<!-- ============ API 配置面板 ============ -->
<div id="apiPanel" class="panel hidden">
  <div class="panel-mask"></div>
  <div class="panel-body">
    <div class="panel-header">
      <span class="panel-title">API 配置</span>
      <button class="panel-close-btn" data-close="apiPanel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-content">
      <!-- 已保存列表 -->
      <div class="section-label">已保存的配置</div>
      <div id="apiList" class="api-list"></div>
      <button id="addApiBtn" class="btn-outline">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#adcdea" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        添加新配置
      </button>
      <!-- 编辑表单 -->
      <div id="apiForm" class="api-form hidden">
        <div class="section-label">编辑配置</div>
        <label>名称</label>
        <input type="text" id="apiName" placeholder="例：OpenAI 中转">
        <label>API 地址</label>
        <input type="url" id="apiUrl" placeholder="https://api.example.com/v1">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
        <label>模型</label>
        <div class="model-row">
          <select id="modelSelect"><option value="">请先拉取模型列表</option></select>
          <button id="fetchModelsBtn" class="btn-sm">拉取</button>
        </div>
        <div class="form-actions">
          <button id="saveApiBtn" class="btn-primary">保存</button>
          <button id="cancelApiBtn" class="btn-ghost">取消</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============ 字体面板 ============ -->
<div id="fontPanel" class="panel hidden">
  <div class="panel-mask"></div>
  <div class="panel-body">
    <div class="panel-header">
      <span class="panel-title">字体设置</span>
      <button class="panel-close-btn" data-close="fontPanel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-content">
      <div class="section-label">预设字体</div>
      <div id="fontList" class="font-list"></div>
      <div class="section-label" style="margin-top:18px">自定义字体</div>
      <p class="hint-text">上传 .ttf / .otf / .woff2 文件</p>
      <label class="upload-btn" for="fontFileInput">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#adcdea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        上传字体文件
      </label>
      <input type="file" id="fontFileInput" accept=".ttf,.otf,.woff,.woff2" class="sr-only">
      <div id="customFontList" class="font-list" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<!-- ============ 背景图面板 ============ -->
<div id="bgPanel" class="panel hidden">
  <div class="panel-mask"></div>
  <div class="panel-body">
    <div class="panel-header">
      <span class="panel-title">背景图片</span>
      <button class="panel-close-btn" data-close="bgPanel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-content">
      <div id="bgPreview" class="bg-preview">
        <span class="bg-placeholder">暂无背景图</span>
      </div>
      <label class="upload-btn" for="bgFileInput" style="margin-top:14px">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#adcdea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        选择图片
      </label>
      <input type="file" id="bgFileInput" accept="image/*" class="sr-only">
      <div class="bg-options">
        <label>模糊程度</label>
        <input type="range" id="bgBlur" min="0" max="30" value="0">
        <label>透明度</label>
        <input type="range" id="bgOpacity" min="20" max="100" value="100">
      </div>
      <button id="clearBgBtn" class="btn-outline" style="margin-top:10px">清除背景</button>
    </div>
  </div>
</div>

<!-- ============ AI 美化面板 ============ -->
<div id="themePanel" class="panel hidden">
  <div class="panel-mask"></div>
  <div class="panel-body">
    <div class="panel-header">
      <span class="panel-title">AI 美化</span>
      <button class="panel-close-btn" data-close="themePanel">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-content">
      <p class="hint-text">描述你想要的网页风格，AI 会帮你生成主题。需要先配置好 API。</p>
      <textarea id="themePrompt" rows="3" placeholder="例：改成暗色主题、让界面更可爱、赛博朋克风格..."></textarea>
      <button id="genThemeBtn" class="btn-primary" style="margin-top:10px">生成主题</button>
      <div id="themeStatus" class="hint-text" style="margin-top:8px"></div>
      <button id="resetThemeBtn" class="btn-outline" style="margin-top:10px">恢复默认主题</button>
    </div>
  </div>
</div>

<!-- 动态 AI 主题样式 -->
<style id="aiThemeStyle"></style>

<script src="script.js"></script>
</body>
</html>
